name: tests

on:
  push:
  pull_request:

jobs:
  solver-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s tests -v
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          UOJ_API_KEY: offline
